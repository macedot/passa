worker_processes 1;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

stream {
    upstream backends {
        least_conn;
        server unix:/sockets/api1.sock max_fails=0;
        server unix:/sockets/api2.sock max_fails=0;
    }

    server {
        listen 8082;
        proxy_pass backends;
        proxy_buffer_size 64k;
        proxy_connect_timeout 1s;
        proxy_timeout 10s;
    }
}
