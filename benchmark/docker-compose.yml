services:
  # ─── Backends ──────────────────────────────────────────────
  backend1:
    image: python:3.12-slim
    volumes:
      - sockets:/sockets
      - ./backend.py:/backend.py:ro
    command: python /backend.py /sockets/api1.sock
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "32MB"

  backend2:
    image: python:3.12-slim
    volumes:
      - sockets:/sockets
      - ./backend.py:/backend.py:ro
    command: python /backend.py /sockets/api2.sock
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "32MB"

  # ─── Proxies ───────────────────────────────────────────────
  passa:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      UPSTREAMS: /sockets/api1.sock,/sockets/api2.sock
      BUF_SIZE: "4096"
    volumes:
      - sockets:/sockets
    ports:
      - "8080:8080"
    depends_on:
      - backend1
      - backend2
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "64MB"
    security_opt:
      - seccomp:unconfined

  haproxy:
    image: haproxy:3.3
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - sockets:/sockets
    ports:
      - "8081:8081"
    depends_on:
      - backend1
      - backend2
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "64MB"

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - sockets:/sockets
    ports:
      - "8082:8082"
    depends_on:
      - backend1
      - backend2
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "64MB"

  # ─── Benchmark tool ────────────────────────────────────────
  bench:
    image: python:3.12-slim
    volumes:
      - ./bench.py:/bench.py:ro
    command: sleep infinity
    depends_on:
      - passa
      - haproxy
      - nginx
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "64MB"

volumes:
  sockets:
    driver: local
