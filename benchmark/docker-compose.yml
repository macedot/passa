services:
  # ─── Backends ──────────────────────────────────────────────
  backend1:
    image: python:3.12-slim
    volumes:
      - sockets:/sockets
      - ./backend.py:/backend.py:ro
    command: python /backend.py /sockets/api1.sock
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "32MB"

  backend2:
    image: python:3.12-slim
    volumes:
      - sockets:/sockets
      - ./backend.py:/backend.py:ro
    command: python /backend.py /sockets/api2.sock
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "32MB"

  # ─── Proxy ─────────────────────────────────────────────────
  passa:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      UPSTREAMS: /sockets/api1.sock,/sockets/api2.sock
      BUF_SIZE: "65536"
    volumes:
      - sockets:/sockets
    ports:
      - "8080:8080"
    depends_on:
      - backend1
      - backend2
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "64MB"
    security_opt:
      - seccomp:unconfined

  # ─── Benchmark tool ────────────────────────────────────────
  bench:
    image: python:3.12-slim
    volumes:
      - ./bench.py:/bench.py:ro
    command: sleep infinity
    depends_on:
      - passa
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "64MB"

volumes:
  sockets:
    driver: local
