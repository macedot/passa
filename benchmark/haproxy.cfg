global
    maxconn 10000
    nbthread 1
    hard-stop-after 1s
    tune.bufsize 65536

defaults
    mode tcp
    maxconn 20000
    timeout connect 50ms
    timeout client 10s
    timeout server 10s
    option dontlognull

frontend tcp_front
    bind *:8081
    default_backend tcp_back

backend tcp_back
    balance roundrobin
    server api1 unix@/sockets/api1.sock maxconn 10000
    server api2 unix@/sockets/api2.sock maxconn 10000
